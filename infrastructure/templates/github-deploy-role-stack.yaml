# Bootstrap IAM for GitHub Actions OIDC (Deploy workflow). NOT invoked from CI/CD — deploy locally
# with scripts/deploy-github-iam-stack.sh or .ps1 (admin credentials).
# IAM allows one OIDC provider per https://token.actions.githubusercontent.com per account. If one
# already exists, set ExistingGithubOidcProviderArn (deleting this stack does not remove that provider).
#
# Keep policy statements aligned with:
#   infrastructure/iam-policy-github-deploy-backend.json
#   infrastructure/iam-policy-github-deploy-web.json
# When those JSON files change, update this template (or vice versa) so drift does not hide in review.

AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub OIDC deploy role + inline policies for StreamMyCourse (manual bootstrap only).

Parameters:
  GitHubRepository:
    Type: String
    Default: Ahmed-Wesam/StreamMyCourse
    Description: Allowed GitHub repo in OIDC sub claim (repo:ORG/REPO:*).
  RoleName:
    Type: String
    Default: StreamMyCourseGitHubDeployWeb
    Description: IAM role name GitHub Actions assumes (matches AWS_DEPLOY_ROLE_ARN).
  ExistingGithubOidcProviderArn:
    Type: String
    Default: ""
    Description: >
      Leave empty to create the GitHub OIDC provider in this stack. If your account already has
      token.actions.githubusercontent.com, set this to its full ARN (arn:aws:iam::ACCOUNT:oidc-provider/token.actions.githubusercontent.com).

Conditions:
  CreateOidcProvider: !Equals [!Ref ExistingGithubOidcProviderArn, ""]

Resources:
  GithubOidcProvider:
    Condition: CreateOidcProvider
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOidcProvider
                - !Ref GithubOidcProvider
                - !Ref ExistingGithubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubRepository}:*"

  StreamMyCourseGitHubDeployBackendPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: StreamMyCourseGitHubDeployBackend
      Roles:
        - !Ref GitHubDeployRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: CloudFormationValidateTemplate
            Effect: Allow
            Action: cloudformation:ValidateTemplate
            Resource: "*"
          - Sid: CloudFormationListStacks
            Effect: Allow
            Action: cloudformation:ListStacks
            Resource: "*"
          - Sid: CloudFormationStreamMyCourseStacks
            Effect: Allow
            Action: cloudformation:*
            Resource:
              - !Sub "arn:aws:cloudformation:eu-west-1:${AWS::AccountId}:stack/StreamMyCourse-*/*"
              - !Sub "arn:aws:cloudformation:eu-west-1:${AWS::AccountId}:stack/streammycourse-*/*"
              - !Sub "arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/StreamMyCourse-*/*"
              - !Sub "arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/streammycourse-*/*"
          - Sid: LambdaStreamMyCourse
            Effect: Allow
            Action: lambda:*
            Resource: !Sub "arn:aws:lambda:eu-west-1:${AWS::AccountId}:function:StreamMyCourse-*"
          - Sid: ApiGatewayEuWest1
            Effect: Allow
            Action:
              - apigateway:*
              - execute-api:*
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: eu-west-1
          - Sid: DynamoDBStreamMyCourse
            Effect: Allow
            Action: dynamodb:*
            Resource:
              - !Sub "arn:aws:dynamodb:eu-west-1:${AWS::AccountId}:table/StreamMyCourse-*"
              - !Sub "arn:aws:dynamodb:eu-west-1:${AWS::AccountId}:table/StreamMyCourse-*/index/*"
          - Sid: LogsStreamMyCourseLambda
            Effect: Allow
            Action: logs:*
            Resource:
              - !Sub "arn:aws:logs:eu-west-1:${AWS::AccountId}:log-group:/aws/lambda/StreamMyCourse-*"
              - !Sub "arn:aws:logs:eu-west-1:${AWS::AccountId}:log-group:/aws/lambda/StreamMyCourse-*:*"
          - Sid: CognitoIdpEuWest1
            Effect: Allow
            Action: cognito-idp:*
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: eu-west-1
          - Sid: AcmUsEast1ForCertStack
            Effect: Allow
            Action: acm:*
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: us-east-1
          - Sid: Route53ForAcmAndAliases
            Effect: Allow
            Action:
              - route53:GetChange
              - route53:ChangeResourceRecordSets
              - route53:ListResourceRecordSets
              - route53:GetHostedZone
              - route53:ListHostedZones
            Resource: "*"
          - Sid: CloudFrontForWebStacks
            Effect: Allow
            Action: cloudfront:*
            Resource: "*"
          - Sid: S3InThisAccount
            Effect: Allow
            Action: s3:*
            Resource: "*"
            Condition:
              StringEquals:
                aws:PrincipalAccount: !Ref AWS::AccountId
          - Sid: IAMStreamMyCourseRoles
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:PassRole
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:TagRole
              - iam:UntagRole
              - iam:UpdateAssumeRolePolicy
            Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/StreamMyCourse-*"
          # First RDS instance in the account creates the RDS service-linked role.
          - Sid: IamRdsServiceLinkedRole
            Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
            Resource: "*"
            Condition:
              StringEquals:
                iam:AWSServiceName: rds.amazonaws.com
          # RDS + VPC + Secrets Manager for the rds-stack (ADR 0008)
          - Sid: RdsStackManage
            Effect: Allow
            Action:
              - rds:CreateDBInstance
              - rds:DeleteDBInstance
              - rds:ModifyDBInstance
              - rds:DescribeDBInstances
              - rds:CreateDBSubnetGroup
              - rds:DeleteDBSubnetGroup
              - rds:DescribeDBSubnetGroups
              - rds:ModifyDBSubnetGroup
              - rds:AddTagsToResource
              - rds:RemoveTagsFromResource
              - rds:ListTagsForResource
              - rds:DescribeDBEngineVersions
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: eu-west-1
          - Sid: Ec2VpcStackManage
            Effect: Allow
            Action:
              - ec2:CreateVpc
              - ec2:DeleteVpc
              - ec2:DescribeVpcs
              - ec2:ModifyVpcAttribute
              - ec2:CreateSubnet
              - ec2:DeleteSubnet
              - ec2:DescribeSubnets
              - ec2:CreateRouteTable
              - ec2:DeleteRouteTable
              - ec2:DescribeRouteTables
              - ec2:AssociateRouteTable
              - ec2:DisassociateRouteTable
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:DescribeSecurityGroups
              - ec2:AuthorizeSecurityGroupEgress
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupEgress
              - ec2:RevokeSecurityGroupIngress
              - ec2:UpdateSecurityGroupRuleDescriptionsEgress
              - ec2:UpdateSecurityGroupRuleDescriptionsIngress
              - ec2:CreateVpcEndpoint
              - ec2:DeleteVpcEndpoints
              - ec2:DescribeVpcEndpoints
              - ec2:ModifyVpcEndpoint
              - ec2:DescribePrefixLists
              - ec2:DescribeAvailabilityZones
              - ec2:CreateTags
              - ec2:DeleteTags
              - ec2:DescribeTags
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: eu-west-1
          # GetRandomPassword is not resource-scoped; keep it only on Resource "*" (SecretsManagerList).
          - Sid: SecretsManagerRdsCredentials
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:GetSecretValue
              - secretsmanager:TagResource
              - secretsmanager:UntagResource
              - secretsmanager:UpdateSecret
              - secretsmanager:PutSecretValue
            Resource:
              - !Sub "arn:aws:secretsmanager:eu-west-1:${AWS::AccountId}:secret:streammycourse/*"
              - !Sub "arn:aws:secretsmanager:eu-west-1:${AWS::AccountId}:secret:rds-db-credentials/*"
          - Sid: SecretsManagerList
            Effect: Allow
            Action:
              - secretsmanager:ListSecrets
              - secretsmanager:GetRandomPassword
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: eu-west-1

  StreamMyCourseGitHubDeployWebPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: StreamMyCourseGitHubDeployWeb
      Roles:
        - !Ref GitHubDeployRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DescribeEdgeHostingStacks
            Effect: Allow
            Action: cloudformation:DescribeStacks
            Resource:
              - !Sub "arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/StreamMyCourse-EdgeHosting-dev/*"
              - !Sub "arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/StreamMyCourse-EdgeHosting-prod/*"
          - Sid: S3EdgeSiteBuckets
            Effect: Allow
            Action:
              - s3:GetBucketLocation
              - s3:ListBucket
              - s3:PutObject
              - s3:DeleteObject
              - s3:GetObject
            Resource:
              - !Sub "arn:aws:s3:::streammycourse-site-dev-us-east-1-${AWS::AccountId}"
              - !Sub "arn:aws:s3:::streammycourse-site-dev-us-east-1-${AWS::AccountId}/*"
              - !Sub "arn:aws:s3:::streammycourse-site-prod-us-east-1-${AWS::AccountId}"
              - !Sub "arn:aws:s3:::streammycourse-site-prod-us-east-1-${AWS::AccountId}/*"
              - !Sub "arn:aws:s3:::streammycourse-teacher-dev-us-east-1-${AWS::AccountId}"
              - !Sub "arn:aws:s3:::streammycourse-teacher-dev-us-east-1-${AWS::AccountId}/*"
              - !Sub "arn:aws:s3:::streammycourse-teacher-prod-us-east-1-${AWS::AccountId}"
              - !Sub "arn:aws:s3:::streammycourse-teacher-prod-us-east-1-${AWS::AccountId}/*"
          - Sid: CloudFrontInvalidation
            Effect: Allow
            Action: cloudfront:CreateInvalidation
            Resource:
              - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"

Outputs:
  GitHubDeployRoleArn:
    Description: Set as GitHub secret AWS_DEPLOY_ROLE_ARN (repo or dev/prod environments).
    Value: !GetAtt GitHubDeployRole.Arn
  GithubOidcProviderArn:
    Condition: CreateOidcProvider
    Description: OIDC provider ARN (only when created by this stack).
    Value: !Ref GithubOidcProvider
