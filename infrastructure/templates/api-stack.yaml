AWSTemplateFormatVersion: '2010-09-09'
Description: 'StreamMyCourse - MVP API Stack (API Gateway + Lambda, no event sources)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment

  CorsAllowOrigin:
    Type: String
    Default: 'http://localhost:5173'
    Description: Allowed CORS origins for Lambda success responses (CSV supported; e.g., "https://app.example.com,https://dev.example.com,http://localhost:5173")

  GatewayResponseAllowOrigin:
    Type: String
    Default: 'http://localhost:5173'
    Description: Single CORS origin for API Gateway error responses (must be a single value, not CSV). Avoid '*' in production.

  DefaultMp4Url:
    Type: String
    Default: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4'
    Description: Default MP4 URL for playback (override in prod)

  VideoUrl:
    Type: String
    Default: ''
    Description: Real video URL from CloudFront (S3 hosted)

  VideoBucketName:
    Type: String
    Default: ''
    Description: S3 bucket name used for video uploads (presigned PUT)

  LambdaCodeS3Bucket:
    Type: String
    Default: ''
    Description: S3 bucket that contains the Lambda deployment zip

  LambdaCodeS3Key:
    Type: String
    Default: ''
    Description: S3 key for the Lambda deployment zip

  TokenAuthorizerCodeS3Key:
    Type: String
    MinLength: 1
    Description: S3 key for the TOKEN authorizer Lambda deployment zip (required)

  CognitoUserPoolArn:
    Type: String
    MinLength: 1
    Description: Cognito User Pool ARN for API Gateway COGNITO_USER_POOLS authorizer (required)

  CognitoClientId:
    Type: String
    MinLength: 1
    Description: >-
      Cognito User Pool Client ID(s) for JWT audience validation.
      Supports comma-separated list for multiple clients (e.g., student + teacher apps).
      Required for public route JWT verification.

  RdsStackName:
    Type: String
    MinLength: 1
    Description: >-
      Name of the RDS stack (e.g. StreamMyCourse-Rds-dev) whose exports provide
      the VPC/subnet/SG/secret and DB_* settings for the catalog Lambda (required).

  LogLevel:
    Type: String
    Default: 'INFO'
    AllowedValues:
      - 'DEBUG'
      - 'INFO'
      - 'WARNING'
      - 'ERROR'
      - 'CRITICAL'
    Description: Log level for Lambda function (DEBUG, INFO, WARNING, ERROR, CRITICAL)

  MediaCleanupQueueUrl:
    Type: String
    Default: ''
    Description: >-
      SQS queue URL for async S3 media cleanup after course delete. When empty,
      the catalog uses synchronous S3 deletes (legacy rollout only).

  MediaCleanupQueueArn:
    Type: String
    Default: ''
    Description: >-
      SQS queue ARN for sqs:SendMessage on the catalog Lambda role. Must be set
      when MediaCleanupQueueUrl is set.

  ProgressCompleteRatio:
    Type: Number
    Default: 0.92
    MinValue: 0.01
    MaxValue: 1.0
    Description: Ratio of video watched to auto-mark lesson complete

  ProgressPositionSlackSec:
    Type: Number
    Default: 30
    MinValue: 0
    Description: Seconds past video end to allow position reporting

Conditions:
  HasVideoBucket: !Not [!Equals [!Ref VideoBucketName, '']]
  IsProd: !Equals [!Ref Environment, prod]
  HasMediaCleanupQueueArn: !Not [!Equals [!Ref MediaCleanupQueueArn, '']]

Resources:
  # Lambda Execution Role
  CatalogLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'StreamMyCourse-CatalogLambdaRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/StreamMyCourse-Catalog-${Environment}:*'
        - PolicyName: S3PresignedUrl
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !If
                  - HasVideoBucket
                  - !Sub 'arn:aws:s3:::${VideoBucketName}/*'
                  # Non-existent bucket prefix: avoids account-wide s3:* on all buckets when param is empty.
                  - 'arn:aws:s3:::streammycourse-no-bucket-configured/NEVER_MATCH/*'
        - !If
          - HasMediaCleanupQueueArn
          - PolicyName: SqsMediaCleanupSend
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - sqs:SendMessage
                  Resource: !Ref MediaCleanupQueueArn
          - !Ref AWS::NoValue
        # VPC ENI lifecycle for Lambda-in-VPC. These actions are resource-less by
        # AWS design (they return IDs from the global EC2 API) — standard for the
        # Lambda-in-VPC pattern.
        - PolicyName: LambdaVpcEni
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: '*'
        # Scoped to the specific RDS credentials secret exported by the RDS stack.
        - PolicyName: SecretsManagerRdsCreds
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !ImportValue
                  'Fn::Sub': '${RdsStackName}-DbSecretArn'
      Tags:
        - Key: Project
          Value: StreamMyCourse
        - Key: Environment
          Value: !Ref Environment

  # Lambda Function
  CatalogLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'StreamMyCourse-Catalog-${Environment}'
      Runtime: python3.11
      Handler: index.lambda_handler
      # Bumped from 15s to 30s to absorb VPC cold-start (~1-2s ENI attach) and
      # Secrets Manager fetch (~0.5-1s on cold start).
      Timeout: 30
      MemorySize: 512
      Role: !GetAtt CatalogLambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      VpcConfig:
        SubnetIds:
          - !ImportValue
            'Fn::Sub': '${RdsStackName}-PrivateSubnetId'
        SecurityGroupIds:
          - !ImportValue
            'Fn::Sub': '${RdsStackName}-LambdaSecurityGroupId'
      Environment:
        Variables:
          DEFAULT_MP4_URL: !Ref DefaultMp4Url
          VIDEO_URL: !Ref VideoUrl
          VIDEO_BUCKET: !Ref VideoBucketName
          ALLOWED_ORIGINS: !Ref CorsAllowOrigin
          LOG_LEVEL: !Ref LogLevel
          DB_HOST: !ImportValue
            'Fn::Sub': '${RdsStackName}-DbHost'
          DB_PORT: !ImportValue
            'Fn::Sub': '${RdsStackName}-DbPort'
          DB_NAME: !ImportValue
            'Fn::Sub': '${RdsStackName}-DbName'
          DB_SECRET_ARN: !ImportValue
            'Fn::Sub': '${RdsStackName}-DbSecretArn'
          MEDIA_CLEANUP_QUEUE_URL: !Ref MediaCleanupQueueUrl
          COGNITO_USER_POOL_ARN: !Ref CognitoUserPoolArn
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          PROGRESS_COMPLETE_RATIO: !Ref ProgressCompleteRatio
          PROGRESS_POSITION_SLACK_SEC: !Ref ProgressPositionSlackSec
      Tags:
        - Key: Project
          Value: StreamMyCourse
        - Key: Environment
          Value: !Ref Environment

  TokenAuthorizerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'StreamMyCourse-CatalogTokenAuthorizerRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/StreamMyCourse-CatalogTokenAuthorizer-${Environment}:*'
      Tags:
        - Key: Project
          Value: StreamMyCourse
        - Key: Environment
          Value: !Ref Environment

  TokenAuthorizerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'StreamMyCourse-CatalogTokenAuthorizer-${Environment}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Timeout: 10
      MemorySize: 256
      Role: !GetAtt TokenAuthorizerLambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref TokenAuthorizerCodeS3Key
      Environment:
        Variables:
          LOG_LEVEL: !Ref LogLevel
          COGNITO_USER_POOL_ARN: !Ref CognitoUserPoolArn
          COGNITO_CLIENT_ID: !Ref CognitoClientId
      Tags:
        - Key: Project
          Value: StreamMyCourse
        - Key: Environment
          Value: !Ref Environment

  # API Gateway REST API
  CatalogApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'StreamMyCourse-Catalog-${Environment}'
      Description: MVP Catalog API
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Project
          Value: StreamMyCourse
        - Key: Environment
          Value: !Ref Environment

  TokenAuthorizerLambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TokenAuthorizerLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CatalogApi}/authorizers/*'

  CatalogApiTokenAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    DependsOn:
      - TokenAuthorizerLambdaApiPermission
    Properties:
      Name: !Sub 'StreamMyCourse-TokenAuthorizer-${Environment}'
      Type: TOKEN
      RestApiId: !Ref CatalogApi
      IdentitySource: method.request.header.Authorization
      AuthorizerResultTtlInSeconds: 300
      AuthorizerUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TokenAuthorizerLambda.Arn}/invocations'

  # API Gateway GatewayResponses to guarantee CORS headers even on errors (e.g., 4XX/5XX)
  # Note: GatewayResponseAllowOrigin must be a single value (not CSV) for API Gateway to accept it
  ApiGatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref CatalogApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Sub "'${GatewayResponseAllowOrigin}'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"

  ApiGatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref CatalogApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Sub "'${GatewayResponseAllowOrigin}'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"

  # API Gateway Resource: /courses
  CoursesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !GetAtt CatalogApi.RootResourceId
      PathPart: courses

  # API Gateway Resource: /courses/mine (instructor-owned courses incl. drafts)
  CoursesMineResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CoursesResource
      PathPart: mine

  # API Gateway Resource: /courses/{courseId}
  CourseIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CoursesResource
      PathPart: '{courseId}'

  # API Gateway Resource: /courses/{courseId}/enroll
  CourseEnrollResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CourseIdResource
      PathPart: enroll

  # API Gateway Resource: /courses/{courseId}/modules
  CourseModulesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CourseIdResource
      PathPart: modules

  # API Gateway Resource: /courses/{courseId}/modules/{moduleId}
  CourseModuleIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CourseModulesResource
      PathPart: '{moduleId}'

  # API Gateway Resource: /courses/{courseId}/lessons
  LessonsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CourseIdResource
      PathPart: lessons

  # API Gateway Resource: /courses/{courseId}/lessons/{lessonId}
  LessonIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref LessonsResource
      PathPart: '{lessonId}'

  # API Gateway Resource: /courses/{courseId}/progress
  CourseProgressResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CourseIdResource
      PathPart: progress

  # API Gateway Resource: /courses/{courseId}/lessons/{lessonId}/progress
  LessonProgressResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref LessonIdResource
      PathPart: progress

  # API Gateway Resource: /courses/{courseId}/lessons/{lessonId}/video-ready
  LessonVideoReadyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref LessonIdResource
      PathPart: video-ready

  # API Gateway Resource: /playback
  PlaybackResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !GetAtt CatalogApi.RootResourceId
      PathPart: playback

  # API Gateway Resource: /playback/{courseId}
  PlaybackCourseIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref PlaybackResource
      PathPart: '{courseId}'

  # API Gateway Resource: /playback/{courseId}/{lessonId}
  PlaybackLessonIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref PlaybackCourseIdResource
      PathPart: '{lessonId}'

  # API Gateway Resource: /upload-url
  UploadUrlResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !GetAtt CatalogApi.RootResourceId
      PathPart: upload-url

  # API Gateway Resource: /users/me
  UsersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !GetAtt CatalogApi.RootResourceId
      PathPart: users

  UsersMeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref UsersResource
      PathPart: me

  # Lambda Permission for API Gateway
  CatalogLambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CatalogLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CatalogApi}/*'

  # API Gateway Method: GET /courses
  CoursesGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CoursesResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: POST /courses
  CoursesPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CoursesResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: OPTIONS /courses (CORS preflight)
  CoursesOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CoursesResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: GET /courses/mine
  CoursesMineGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CoursesMineResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: OPTIONS /courses/mine (CORS preflight)
  CoursesMineOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CoursesMineResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: GET /courses/{courseId}
  CourseIdGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseIdResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: POST /courses/{courseId}/enroll
  CourseEnrollPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseEnrollResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: OPTIONS /courses/{courseId}/enroll
  CourseEnrollOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseEnrollResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: GET /courses/{courseId}/modules
  CourseModulesGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseModulesResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: POST /courses/{courseId}/modules
  CourseModulesPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseModulesResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: OPTIONS /courses/{courseId}/modules
  CourseModulesOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseModulesResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: DELETE /courses/{courseId}/modules/{moduleId}
  CourseModuleIdDeleteMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseModuleIdResource
      HttpMethod: DELETE
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: OPTIONS /courses/{courseId}/modules/{moduleId}
  CourseModuleIdOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseModuleIdResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: PUT /courses/{courseId}
  CourseIdPutMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseIdResource
      HttpMethod: PUT
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: DELETE /courses/{courseId}
  CourseIdDeleteMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseIdResource
      HttpMethod: DELETE
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: OPTIONS /courses/{courseId} (CORS preflight)
  CourseIdOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseIdResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Resource: /courses/{courseId}/publish
  CoursePublishResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CourseIdResource
      PathPart: publish

  # API Gateway Method: PUT /courses/{courseId}/publish
  CoursePublishPutMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CoursePublishResource
      HttpMethod: PUT
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Method: OPTIONS /courses/{courseId}/publish (CORS preflight)
  CoursePublishOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CoursePublishResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Resource: /courses/{courseId}/thumbnail-ready
  CourseThumbnailReadyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CatalogApi
      ParentId: !Ref CourseIdResource
      PathPart: thumbnail-ready

  # API Gateway Method: PUT /courses/{courseId}/thumbnail-ready
  CourseThumbnailReadyPutMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CatalogApi
      ResourceId: !Ref CourseThumbnailReadyResource
      HttpMethod: PUT
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CatalogApiTokenAuthorizer
      Integration:
