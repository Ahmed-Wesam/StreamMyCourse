        Type: AWS_PROXY
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatalogLambda.Arn}/invocations'

  # API Gateway Deployment
  # Include Lambda artifact key in Description so this resource updates whenever the
  # catalog zip changes, forcing a new deployment. Otherwise CloudFormation can leave
  # the stage on an old snapshot while method definitions (e.g. Cognito) drift ahead —
  # clients then hit Lambda without authorizer.claims and see "Authentication required".
  # Bump logical id when API methods/resources change so CloudFormation always
  # creates a new deployment; otherwise the stage can keep serving an old snapshot
  # (symptom: GET /courses/{id}/preview returns API GW 403 Missing Authentication Token).
  CatalogApiDeploymentV8:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - CatalogLambdaApiPermission
      - CoursesGetMethod
      - CoursesPostMethod
      - CoursesOptionsMethod
      - CoursesMineGetMethod
      - CoursesMineOptionsMethod
      - CourseIdGetMethod
      - CoursePreviewGetMethod
      - CoursePreviewOptionsMethod
      - CourseEnrollPostMethod
      - CourseEnrollOptionsMethod
      - CourseIdPutMethod
      - CourseIdDeleteMethod
      - CourseIdOptionsMethod
      - CoursePublishPutMethod
      - CoursePublishOptionsMethod
      - CourseThumbnailReadyPutMethod
      - CourseThumbnailReadyOptionsMethod
      - LessonsGetMethod
      - LessonsPostMethod
      - LessonsOptionsMethod
      - LessonIdPutMethod
      - LessonIdDeleteMethod
      - LessonIdOptionsMethod
      - LessonVideoReadyPutMethod
      - LessonVideoReadyOptionsMethod
      - PlaybackGetMethod
      - PlaybackOptionsMethod
      - UploadUrlPostMethod
      - UploadUrlOptionsMethod
      - UsersMeGetMethod
      - UsersMeOptionsMethod
    Properties:
      RestApiId: !Ref CatalogApi
      Description: !Sub 'catalog-${LambdaCodeS3Key}'

  # API Gateway Stage
  CatalogApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref CatalogApi
      DeploymentId: !Ref CatalogApiDeploymentV8
      StageName: !Ref Environment
      Description: !Sub '${Environment} stage for Catalog API'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingBurstLimit: 200
          ThrottlingRateLimit: 100
          MetricsEnabled: true

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${CatalogApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'

  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref CatalogLambda

  TableName:
    Description: DynamoDB table name
    Value: !Ref CatalogTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
