name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Knip
        run: npm run knip
      - name: Typecheck and production build
        run: npm run build:all
      - name: Vitest unit tests
        run: npm run test

  lambda:
    name: Lambda syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Python compile (lambda)
        run: |
          python - <<'PY'
          import glob, py_compile
          paths = glob.glob('infrastructure/lambda/catalog/**/*.py', recursive=True)
          for p in paths:
              py_compile.compile(p, doraise=True)
          print('OK', len(paths))
          PY
      - name: Lambda boundary import checks
        run: python scripts/check_lambda_boundaries.py
      - name: Install static analysis tools
        run: pip install vulture radon
      - name: Vulture (dead code)
        run: python -m vulture infrastructure/lambda/catalog infrastructure/lambda/cognito_user_profile_sync --min-confidence 61
      - name: Radon cyclomatic complexity (informational)
        continue-on-error: true
        run: python -m radon cc infrastructure/lambda/catalog infrastructure/lambda/cognito_user_profile_sync -a -nc

  cloudformation:
    name: CloudFormation sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Parse CloudFormation YAML
        run: |
          python scripts/parse_cloudformation_yaml.py infrastructure/templates/api-stack.yaml
          python scripts/parse_cloudformation_yaml.py infrastructure/templates/auth-stack.yaml
          python scripts/parse_cloudformation_yaml.py infrastructure/templates/video-stack.yaml
          python scripts/parse_cloudformation_yaml.py infrastructure/templates/edge-hosting-stack.yaml
          python scripts/parse_cloudformation_yaml.py infrastructure/templates/github-deploy-role-stack.yaml
          python scripts/parse_cloudformation_yaml.py infrastructure/templates/billing-alarm.yaml
          python scripts/parse_cloudformation_yaml.py infrastructure/templates/rds-stack.yaml

  workflow-lint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install and run actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash)
          ./actionlint -color

  integ-tests-static:
    name: Integ tests static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies (for import-time checks)
        run: pip install -r tests/integration/requirements.txt
      - name: Python compile (tests/integration)
        run: |
          python - <<'PY'
          import glob, py_compile
          paths = glob.glob('tests/integration/**/*.py', recursive=True)
          for p in paths:
              py_compile.compile(p, doraise=True)
          print('OK', len(paths))
          PY
      - name: pytest --collect-only (catches import errors and broken markers)
        working-directory: tests/integration
        run: pytest --collect-only -q

  lambda-unit-tests:
    name: Lambda unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r tests/unit/requirements.txt
      - name: Run pytest with coverage
        run: coverage run -m pytest tests/unit -q --junitxml=tests/unit/results.xml
      - name: Coverage report (informational)
        run: coverage report --include="infrastructure/lambda/catalog/**" -m | tee /tmp/cov.txt
      - name: Append coverage summary to job summary
        if: always()
        run: |
          {
            echo "### Lambda unit-test coverage"
            echo
            echo '```'
            tail -n 1 /tmp/cov.txt 2>/dev/null || echo "(coverage report unavailable)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lambda-unit-test-results
          path: tests/unit/results.xml

