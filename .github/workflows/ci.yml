name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Knip
        run: npm run knip
      - name: Typecheck and production build
        run: npm run build:all
      - name: Vitest unit tests
        run: npm run test
        env:
          VITE_API_BASE_URL: https://api.test.example/v1

  lambda:
    name: Lambda syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Python compile (lambda)
        run: |
          python - <<'PY'
          import glob, py_compile
          paths = glob.glob('infrastructure/lambda/catalog/**/*.py', recursive=True)
          for p in paths:
              py_compile.compile(p, doraise=True)
          print('OK', len(paths))
          PY
      - name: Lambda boundary import checks
        run: python scripts/check_lambda_boundaries.py
      - name: Install static analysis tools
        run: pip install vulture radon
      - name: Vulture (dead code)
        run: python -m vulture infrastructure/lambda/catalog infrastructure/lambda/cognito_user_profile_sync --min-confidence 61
      - name: Radon cyclomatic complexity (informational)
        continue-on-error: true
        run: python -m radon cc infrastructure/lambda/catalog infrastructure/lambda/cognito_user_profile_sync -a -nc

  cloudformation:
    name: CloudFormation sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install cfn-lint
      - name: cfn-lint
        run: |
          cfn-lint --config-file .cfnlintrc infrastructure/templates/api-stack.yaml
          cfn-lint --config-file .cfnlintrc infrastructure/templates/auth-stack.yaml
          cfn-lint --config-file .cfnlintrc infrastructure/templates/video-stack.yaml
          cfn-lint --config-file .cfnlintrc infrastructure/templates/edge-hosting-stack.yaml
          cfn-lint --config-file .cfnlintrc infrastructure/templates/github-deploy-role-stack.yaml
          cfn-lint --config-file .cfnlintrc infrastructure/templates/billing-alarm.yaml
          cfn-lint --config-file .cfnlintrc infrastructure/templates/rds-stack.yaml
          cfn-lint --config-file .cfnlintrc infrastructure/templates/media-cleanup-stack.yaml
          cfn-lint --config-file .cfnlintrc infrastructure/templates/payments-stack.yaml

  security:
    name: Security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python security tools
        run: pip install checkov pip-audit

      - name: Checkov IaC scan
        run: checkov --config-file .checkov.yaml --skip-download

      - name: pip-audit
        run: |
          pip-audit \
            -r infrastructure/lambda/catalog/requirements.txt \
            -r infrastructure/lambda/cognito_user_profile_sync/requirements.txt \
            -r infrastructure/lambda/catalog_token_authorizer/requirements.txt \
            -r infrastructure/lambda/billing_fulfillment/requirements.txt \
            -r tests/unit/requirements.txt \
            -r tests/integration/requirements.txt

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          release_json="$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest)"
          version="$(python -c 'import json, sys; print(json.load(sys.stdin)["tag_name"])' <<< "$release_json")"
          archive="gitleaks_${version#v}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${version}/${archive}" -o "/tmp/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks secret scan
        run: gitleaks git . --config .gitleaks.toml --redact --no-banner --verbose --log-opts=HEAD

  workflow-lint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install and run actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash)
          ./actionlint -color

  integration-tests-static:
    name: Integration tests static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies (for import-time checks)
        run: pip install -r tests/integration/requirements.txt
      - name: Python compile (tests/integration)
        run: |
          python - <<'PY'
          import glob, py_compile
          paths = glob.glob('tests/integration/**/*.py', recursive=True)
          for p in paths:
              py_compile.compile(p, doraise=True)
          print('OK', len(paths))
          PY
      - name: pytest --collect-only (catches import errors and broken markers)
        working-directory: tests/integration
        run: pytest --collect-only -q

  lambda-unit-tests:
    name: Lambda unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r tests/unit/requirements.txt
      - name: Run pytest with coverage
        run: coverage run -m pytest tests/unit -q --junitxml=tests/unit/results.xml
      - name: Coverage report (informational)
        run: coverage report --include="infrastructure/lambda/catalog/**" -m | tee /tmp/cov.txt
      - name: Append coverage summary to job summary
        if: always()
        run: |
          {
            echo "### Lambda unit-test coverage"
            echo
            echo '```'
            tail -n 1 /tmp/cov.txt 2>/dev/null || echo "(coverage report unavailable)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lambda-unit-test-results
          path: tests/unit/results.xml

