# Manual-only subset of Deploy: runs the same steps as workflow **Deploy → deploy-backend-dev**
# (auth + `./scripts/deploy-backend.sh dev`). Does not deploy edge/RDS/schema or downstream web/integration jobs.
#
# Trigger from Actions UI or:
#   gh workflow run deploy-backend-dev-only.yml --ref main
#
name: Deploy backend dev only

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  deploy-backend-dev:
    name: Backend (dev) — Video + API
    runs-on: ubuntu-latest
    environment: dev
    env:
      RDS_STACK_NAME: StreamMyCourse-Rds-dev
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Require Cognito configuration
        env:
          COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
        run: |
          set -euo pipefail
          if [[ -z "${COGNITO_DOMAIN_PREFIX}" ]]; then
            echo "GitHub Environment variable COGNITO_DOMAIN_PREFIX must be set for full deploy (auth stack is required)." >&2
            exit 1
          fi

      - name: Require Google OAuth
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${GOOGLE_OAUTH_CLIENT_ID}" || -z "${GOOGLE_OAUTH_CLIENT_SECRET}" ]]; then
            echo "GitHub Environment secrets GOOGLE_OAUTH_CLIENT_ID and GOOGLE_OAUTH_CLIENT_SECRET must be set for full deploy (Google-federation-only auth stack)." >&2
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Package and upload Cognito user profile sync Lambda (dev)
        id: cognito_sync_pkg
        env:
          CHECKOUT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REGION="${{ env.AWS_REGION }}"
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text --region "$REGION")"
          BUCKET="streammycourse-artifacts-${ACCOUNT}-${REGION}"
          SHA="${CHECKOUT_SHA:?missing CHECKOUT_SHA}"
          SHORT="${SHA:0:12}"
          KEY="cognito-user-profile-sync-dev-${SHORT}.zip"
          STAGE="$(mktemp -d)"
          PKG="$STAGE/pkg"
          mkdir -p "$PKG"
          WS="${{ github.workspace }}"
          cp "$WS/infrastructure/lambda/cognito_user_profile_sync/_vendor_bootstrap.py" "$PKG/"
          cp "$WS/infrastructure/lambda/cognito_user_profile_sync/handler.py" "$PKG/"
          cp "$WS/infrastructure/lambda/cognito_user_profile_sync/sync_config.py" "$PKG/"
          cp "$WS/infrastructure/lambda/cognito_user_profile_sync/repo.py" "$PKG/"
          pip install psycopg2-binary==2.9.9 \
            --quiet \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --python-version 3.11 \
            --implementation cp \
            -t "$PKG/_vendor"
          (cd "$PKG" && zip -rq "$STAGE/bundle.zip" .)
          aws s3 cp "$STAGE/bundle.zip" "s3://${BUCKET}/${KEY}" --region "$REGION"
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"
          echo "Uploaded Cognito profile sync s3://${BUCKET}/${KEY}"

      - name: Deploy auth (dev) — Cognito
        run: |
          set -euo pipefail
          STACK="StreamMyCourse-Auth-dev"
          # When GitHub Environment vars override Cognito callback/logout lists, they often omit
          # local Vite origins (see frontend/src/lib/auth.ts); missing entries → redirect_mismatch.
          student_cb="${STUDENT_COGNITO_CALLBACK_URLS:-}"
          student_lo="${STUDENT_COGNITO_LOGOUT_URLS:-}"
          teacher_cb="${TEACHER_COGNITO_CALLBACK_URLS:-}"
          teacher_lo="${TEACHER_COGNITO_LOGOUT_URLS:-}"
          # Merge local Vite URLs even when GH vars are unset (empty would skip overrides and omit dev redirects).
          [[ "$student_cb" != *"http://localhost:5173/"* ]] && student_cb="${student_cb:+$student_cb,}http://localhost:5173/"
          [[ "$student_cb" != *"http://127.0.0.1:5173/"* ]] && student_cb="${student_cb:+$student_cb,}http://127.0.0.1:5173/"
          [[ "$student_lo" != *"http://localhost:5173/"* ]] && student_lo="${student_lo:+$student_lo,}http://localhost:5173/"
          [[ "$student_lo" != *"http://127.0.0.1:5173/"* ]] && student_lo="${student_lo:+$student_lo,}http://127.0.0.1:5173/"
          [[ "$teacher_cb" != *"http://localhost:5174/"* ]] && teacher_cb="${teacher_cb:+$teacher_cb,}http://localhost:5174/"
          [[ "$teacher_cb" != *"http://127.0.0.1:5174/"* ]] && teacher_cb="${teacher_cb:+$teacher_cb,}http://127.0.0.1:5174/"
          [[ "$teacher_lo" != *"http://localhost:5174/"* ]] && teacher_lo="${teacher_lo:+$teacher_lo,}http://localhost:5174/"
          [[ "$teacher_lo" != *"http://127.0.0.1:5174/"* ]] && teacher_lo="${teacher_lo:+$teacher_lo,}http://127.0.0.1:5174/"
          aws cloudformation validate-template \
            --template-body "file://${{ github.workspace }}/infrastructure/templates/auth-stack.yaml" \
            --region "${{ env.AWS_REGION }}"
          auth_params=(
            "Environment=dev"
            "CognitoDomainPrefix=${{ vars.COGNITO_DOMAIN_PREFIX }}"
            "GoogleClientId=${GOOGLE_OAUTH_CLIENT_ID}"
            "GoogleClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET}"
            "RdsStackName=StreamMyCourse-Rds-dev"
            "EnableUserProfileSync=true"
            "CognitoUserProfileSyncCodeS3Bucket=${{ steps.cognito_sync_pkg.outputs.bucket }}"
            "CognitoUserProfileSyncCodeS3Key=${{ steps.cognito_sync_pkg.outputs.key }}"
          )
          [[ -n "$student_cb" ]] && auth_params+=("StudentCallbackUrls=$student_cb")
          [[ -n "$student_lo" ]] && auth_params+=("StudentLogoutUrls=$student_lo")
          [[ -n "$teacher_cb" ]] && auth_params+=("TeacherCallbackUrls=$teacher_cb")
          [[ -n "$teacher_lo" ]] && auth_params+=("TeacherLogoutUrls=$teacher_lo")
          aws cloudformation deploy \
            --template-file "${{ github.workspace }}/infrastructure/templates/auth-stack.yaml" \
            --stack-name "$STACK" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region "${{ env.AWS_REGION }}" \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${auth_params[@]}"

          USER_POOL_ARN="$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --region "${{ env.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolArn'].OutputValue" \
            --output text)"
          if [[ -z "$USER_POOL_ARN" ]]; then
            echo "Failed to resolve UserPoolArn output from $STACK" >&2
            exit 1
          fi
          echo "COGNITO_USER_POOL_ARN=$USER_POOL_ARN" >> "$GITHUB_ENV"
        env:
          STUDENT_COGNITO_CALLBACK_URLS: ${{ vars.STUDENT_COGNITO_CALLBACK_URLS }}
          STUDENT_COGNITO_LOGOUT_URLS: ${{ vars.STUDENT_COGNITO_LOGOUT_URLS }}
          TEACHER_COGNITO_CALLBACK_URLS: ${{ vars.TEACHER_COGNITO_CALLBACK_URLS }}
          TEACHER_COGNITO_LOGOUT_URLS: ${{ vars.TEACHER_COGNITO_LOGOUT_URLS }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

      - name: Deploy dev
        run: |
          chmod +x scripts/deploy-backend.sh
          ./scripts/deploy-backend.sh dev

      - name: Summary
        if: success()
        run: |
          echo "## Backend dev (manual subset)" >> "$GITHUB_STEP_SUMMARY"
          echo "Video stack + API stack for **dev** deployed (or no-op changeset)." >> "$GITHUB_STEP_SUMMARY"
